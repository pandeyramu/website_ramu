<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <link rel="stylesheet" href="otp.css">
</head>
<body>
    <div class="num">
        <h1> Enter the OTP code </h1>
        <div class="input">
            <p> A 6 digit Verification code has been sent to your E-mail. <br> Enter the Verification code below:</p>
            <input id="first" type="text" maxlength="1">
            <input id="second" type="text" maxlength="1">
            <input id="third" type="text" maxlength="1">
            <input id="fourth" type="text" maxlength="1">
            <input id="fifth" type="text" maxlength="1">
            <input id="sixth" type="text" maxlength="1">
            <input id="btn" type="button" value="Verify">
        </div>
    </div>
<script src="otp.js"> </script>
</body>

</html>
